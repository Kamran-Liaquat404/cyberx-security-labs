<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Password Security Analyzer</title>

<style>

body{
margin:0;
font-family:Consolas,monospace;
background:#020202;
color:#e5ffe9;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* header */

h1{
color:#00ff88;
text-shadow:0 0 15px #00ff88;
margin-bottom:20px;
}

/* container */

.container{
width:100%;
max-width:700px;
background:#050606;
border:1px solid #0f2;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px #000;
}

/* input */

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
border:1px solid #00ff88;
background:#000;
color:#fff;
outline:none;
}

/* strength meter */

.meter{
margin-top:20px;
height:15px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.meter-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff0000,#ff7700,#ffee00,#00ff66);
transition:width .4s;
}

/* panels */

.panel{
margin-top:20px;
padding:15px;
background:#020202;
border:1px solid #0a2;
border-radius:8px;
}

.panel h3{
margin:0 0 10px 0;
color:#00ff88;
}

/* terminal */

.terminal{
margin-top:20px;
background:#000;
border:1px solid #0f0;
padding:15px;
height:160px;
overflow:auto;
font-size:14px;
}

.good{color:#00ff66}
.warn{color:#ffaa00}
.bad{color:#ff4444}

footer{
margin-top:30px;
color:#888;
font-size:13px;
text-align:center;
}

</style>
</head>

<body>

<h1>Password Security Analyzer</h1>

<div class="container">

<input type="password" id="password" placeholder="Enter password..." oninput="analyzePassword()">

<div class="meter">
<div class="meter-fill" id="meter"></div>
</div>

<div class="panel">
<h3>Analysis</h3>
<div id="analysis">Waiting for input...</div>
</div>

<div class="panel">
<h3>Estimated Crack Time</h3>
<div id="crack">---</div>
</div>

<div class="terminal" id="terminal"></div>

</div>

<footer>
Developed by Kamran Baloch
</footer>

<script>

/* dictionary */

const commonPasswords=[
"123456","password","12345678","qwerty","abc123","football",
"iloveyou","admin","welcome","letmein"
];

/* terminal log */

function log(msg){
const term=document.getElementById("terminal");
term.innerHTML+="> "+msg+"<br>";
term.scrollTop=term.scrollHeight;
}

/* entropy */

function entropy(password){

let charset=0;

if(/[a-z]/.test(password)) charset+=26
if(/[A-Z]/.test(password)) charset+=26
if(/[0-9]/.test(password)) charset+=10
if(/[^A-Za-z0-9]/.test(password)) charset+=32

return password.length*Math.log2(charset||1)

}

/* crack time */

function crackTime(ent){

let guesses=Math.pow(2,ent)

let seconds=guesses/1e10

if(seconds<1) return "Instantly"
if(seconds<60) return "Seconds"
if(seconds<3600) return "Minutes"
if(seconds<86400) return "Hours"
if(seconds<31536000) return "Months"
return "Centuries"

}

/* analyzer */

function analyzePassword(){

let p=document.getElementById("password").value

let meter=document.getElementById("meter")
let analysis=document.getElementById("analysis")
let crack=document.getElementById("crack")

document.getElementById("terminal").innerHTML=""

log("Analyzing password length")

let score=0

if(p.length>=8){score+=20;log("Length OK")}
else log("Length too short")

if(/[A-Z]/.test(p)){score+=15;log("Uppercase detected")}
if(/[a-z]/.test(p)){score+=15;log("Lowercase detected")}
if(/[0-9]/.test(p)){score+=15;log("Numbers detected")}
if(/[^A-Za-z0-9]/.test(p)){score+=15;log("Special characters detected")}

if(commonPasswords.includes(p.toLowerCase())){
score=5
log("Common password detected")
}

meter.style.width=score+"%"

let ent=entropy(p)

analysis.innerHTML="Entropy: "+ent.toFixed(2)+" bits"

crack.innerHTML=crackTime(ent)

}

</script>

</body>
</html>
