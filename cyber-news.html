<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cyber News — Mobile Friendly</title>
<style>
:root{
  --bg:#000; --panel:#071011; --accent:#ff3b3b; --green:#00ff88; --muted:#9fb3a0;
  --glass: rgba(255,255,255,0.03); --radius:12px; --mono: ui-monospace, Menlo, Monaco, "Courier New", monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:var(--bg);color:#e6fff2;padding:12px;line-height:1.5;}
header{margin-bottom:12px;}
.brand{font-weight:900;color:var(--accent);font-size:20px;}
.sub{color:var(--muted);font-size:13px;margin-top:2px;}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
input,select,button{border-radius:10px;padding:10px;font-family:var(--mono);}
input,select{background:transparent;border:1px solid var(--glass);color:inherit;flex:1;min-width:120px;}
button{cursor:pointer;font-weight:800;}
.btn-primary{background:linear-gradient(90deg,var(--accent),#990000);color:#fff;border:none;}
.btn-ghost{background:transparent;border:1px solid var(--glass);color:var(--muted);}
.grid{display:flex;flex-direction:column;gap:12px;}
.panel{background:var(--panel);padding:14px;border-radius:var(--radius);border:1px solid var(--glass);}
.feed-list{display:flex;flex-direction:column;gap:10px;}
.card{padding:12px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.01),rgba(255,255,255,0));border:1px solid rgba(255,255,255,0.02);}
.title{font-weight:800;font-size:15px;color:#fff;}
.meta{color:var(--muted);font-size:13px;margin-top:6px;}
.tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;}
.tag{background:rgba(255,255,255,0.02);padding:6px 8px;border-radius:999px;font-size:12px;font-family:var(--mono);color:var(--muted);font-weight:700;}
.action-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.saved{color:var(--green);font-weight:800;}
.log{margin-top:12px;padding:8px;background:rgba(255,255,255,0.01);border-radius:8px;max-height:160px;overflow:auto;font-family:var(--mono);font-size:13px;color:var(--muted);}
@media(min-width:768px){.grid{flex-direction:row}.grid>.panel{flex:1}}
</style>
</head>
<body>

<header>
  <div class="brand">Cyber News</div>
  <div class="sub">Live hacking • security • tech — aggregated & filterable</div>
</header>

<div class="toolbar" role="search">
  <input id="query" type="search" placeholder="Search news, CVE, breach, malware..." />
  <select id="sourceSelect">
    <option value="all">All sources</option>
    <option value="hackernews">Hacker News</option>
    <option value="newsapi">NewsAPI.org</option>
    <option value="rss">RSS</option>
  </select>
  <select id="filter">
    <option value="all">All categories</option>
    <option value="breach">Breach / Leak</option>
    <option value="vuln">Vulnerability</option>
    <option value="tools">Tools / Releases</option>
    <option value="policy">Policy / Law</option>
  </select>
  <button id="btnFetch" class="btn-primary">Fetch</button>
  <button id="btnAuto" class="btn-ghost">Auto-refresh: Off</button>
</div>

<div class="grid">
  <section class="panel" aria-live="polite">
    <div id="feed" class="feed-list"></div>
    <div class="small" style="margin-top:8px;">Tip: use Search & Filter. For production, secure APIs via proxy.</div>
  </section>

  <aside class="panel">
    <div class="card">
      <strong>Saved Articles</strong>
      <div id="savedList" style="margin-top:8px;">No saved articles</div>
      <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
        <button id="exportSaved" class="btn-ghost">Export JSON</button>
        <button id="clearSaved" class="btn-ghost">Clear Saved</button>
      </div>
    </div>
    <div class="card">
      <strong>Logs</strong>
      <div id="log" class="log">Ready.</div>
    </div>
  </aside>
</div>

</body>
          </html>
