<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IP Tracker Simulator — Pro Lab</title>
<style>
:root{
  --bg:#010101;
  --panel:#0b0f12;
  --accent:#00ff88;
  --neon:#ff3b3b;
  --glass:rgba(255,255,255,0.04);
  --muted:#9fb3a0;
  --radius:14px;
  --mono:ui-monospace,Menlo,monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:#dfffe6;font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;}
.wrap{max-width:1200px;margin:auto;padding:20px;}
header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;}
.brand{font-size:22px;font-weight:900;color:var(--neon);}
.grid{display:grid;grid-template-columns:1fr 380px;gap:20px;margin-top:20px;}
@media(max-width:980px){.grid{grid-template-columns:1fr;}}
.panel{background:var(--panel);border:1px solid var(--glass);border-radius:var(--radius);padding:18px;}
h1,h3{margin:0;color:var(--accent);}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
input{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.05);background:transparent;color:inherit;font-family:var(--mono);}
button{padding:12px 16px;border-radius:10px;border:none;font-weight:800;cursor:pointer;}
.primary{background:linear-gradient(90deg,var(--neon),#990000);color:#fff;}
.ghost{background:transparent;border:1px solid rgba(255,255,255,0.08);color:var(--muted);}
.results{margin-top:16px;background:rgba(0,0,0,0.5);border:1px solid var(--glass);border-radius:12px;padding:16px;}
table{width:100%;border-collapse:collapse;margin-top:12px;}
td,th{padding:8px;text-align:left;border-bottom:1px dashed rgba(255,255,255,0.05);font-size:13px;}
.map{margin-top:16px;height:280px;border-radius:10px;border:1px solid var(--glass);overflow:hidden;}
.history{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
.history button{padding:8px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:var(--muted);cursor:pointer;font-size:13px;text-align:left;}
@media(max-width:700px){.grid{grid-template-columns:1fr;}.map{height:200px;}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">IP Tracker Pro</div>
</header>
<main class="grid">
<section class="panel">
  <div class="row">
    <input id="target" placeholder="IP / Domain">
    <button class="primary" id="lookup">Simulate</button>
  </div>
  <div class="row">
    <button class="ghost" id="clear">Clear</button>
  </div>
  <div class="results">
    <strong>Status:</strong> <span id="status">Idle</span>
    <table id="table" style="display:none">
      <tbody>
        <tr><th>IP</th><td id="ip"></td></tr>
        <tr><th>ISP</th><td id="isp"></td></tr>
        <tr><th>Country</th><td id="country"></td></tr>
        <tr><th>Region</th><td id="region"></td></tr>
        <tr><th>City</th><td id="city"></td></tr>
        <tr><th>Latitude</th><td id="lat"></td></tr>
        <tr><th>Longitude</th><td id="lon"></td></tr>
        <tr><th>Timezone</th><td id="tz"></td></tr>
      </tbody>
    </table>
    <div class="map" id="map" style="display:none">
      <iframe id="mapFrame" style="width:100%;height:100%;border:0"></iframe>
    </div>
  </div>
</section>
<aside class="panel">
  <h3>History</h3>
  <div id="history" class="history"></div>
</aside>
</main>
</div>

<script>
const qs=id=>document.getElementById(id);
let hist=[];
function hash(s){let h=2166136261;for(let c of s){h^=c.charCodeAt(0);h=Math.imul(h,16777619);}return h>>>0;}
function rand(seed){return ()=> (seed=Math.imul(seed,1664525)+1013904223>>>0)/4294967296;}
function simulate(input){
  const r=rand(hash(input));
  const countries=["Pakistan","USA","Germany","UK","Japan","India","France","Brazil","Canada"];
  const cities=["Karachi","Lahore","Berlin","London","Tokyo","Mumbai","Paris","Rio","Toronto"];
  return{
    ip:input,
    isp:"Demo ISP",
    country:countries[Math.floor(r()*countries.length)],
    region:"Simulated Region",
    city:cities[Math.floor(r()*cities.length)],
    lat:(r()*140-70).toFixed(4),
    lon:(r()*360-180).toFixed(4),
    tz:"Simulated/Zone"
  }
}
function addHistory(entry){
  if(!hist.includes(entry)) hist.unshift(entry);
  const hDiv=qs("history"); hDiv.innerHTML="";
  hist.forEach(ip=>{
    const b=document.createElement("button");
    b.textContent=ip;
    b.onclick=()=>{ qs("target").value=ip; qs("lookup").click();}
    hDiv.appendChild(b);
  });
}
qs("lookup").onclick=()=>{
  const t=qs("target").value.trim();
  if(!t) return;
  const r=simulate(t);
  qs("status").textContent="Done";
  ["ip","isp","country","region","city","lat","lon","tz"].forEach(k=>qs(k).textContent=r[k]);
  qs("table").style.display="";
  qs("map").style.display="";
  qs("mapFrame").src=`https://www.openstreetmap.org/export/embed.html?marker=${r.lat},${r.lon}`;
  addHistory(t);
};
qs("clear").onclick=()=>{
  qs("target").value="";
  qs("status").textContent="Idle";
  qs("table").style.display="none";
  qs("map").style.display="none";
};
</script>
</body>
        </html>
