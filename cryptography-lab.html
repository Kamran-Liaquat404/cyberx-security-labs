<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cryptography Lab</title>
<style>
:root{
  --bg:#0f0f0f;
  --primary:#00ff88;
  --secondary:#ff3b3b;
  --muted:#aaa;
  --panel:#1a1a1a;
  --radius:12px;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;background:var(--bg);color:var(--primary);line-height:1.5;min-height:100vh;padding:12px;}
h1,h3{color:var(--primary)}
p{color:var(--muted)}
.panel{background:var(--panel);padding:16px;border-radius:var(--radius);margin-bottom:12px;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
input,textarea,select,button{font-family:var(--mono);font-size:14px;}
input,textarea,select{width:100%;padding:10px;margin-top:6px;margin-bottom:6px;border-radius:8px;background:#111;border:1px solid #333;color:var(--primary);}
textarea{resize:vertical;}
button{cursor:pointer;padding:10px 12px;margin-top:4px;margin-bottom:4px;border:none;border-radius:8px;font-weight:700;}
.btn-primary{background:var(--primary);color:#0f0f0f;}
.btn-ghost{background:transparent;border:1px solid #333;color:var(--primary);}
.row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
.row .col{flex:1}
.log{background:#111;padding:8px;border-radius:8px;max-height:120px;overflow:auto;font-family:var(--mono);color:var(--muted);}
@media(min-width:600px){.row{flex-wrap:nowrap}}
</style>
</head>
<body>

<h1>Cryptography Lab</h1>
<p>All operations are local in your browser. Keep keys secret.</p>

<div class="panel">
  <h3>Input / Plaintext</h3>
  <textarea id="inputText" placeholder="Type text here..."></textarea>
  <div class="row">
    <button class="btn-ghost" id="fillDemo">Demo Text</button>
    <button class="btn-ghost" id="clearInput">Clear</button>
  </div>
</div>

<div class="panel">
  <h3>Symmetric AES-GCM</h3>
  <input type="password" id="symPass" placeholder="Passphrase">
  <select id="symAlg"><option>AES-256</option><option>AES-128</option></select>
  <select id="symIter"><option>100k iter</option><option selected>200k iter</option><option>400k iter</option></select>
  <div class="row">
    <button class="btn-primary" id="symEncrypt">Encrypt</button>
    <button class="btn-ghost" id="symDecrypt">Decrypt</button>
  </div>
</div>

<div class="panel">
  <h3>Asymmetric RSA-OAEP (2048)</h3>
  <div class="row">
    <button class="btn-primary" id="genRsa">Generate Keypair</button>
    <button class="btn-ghost" id="exportPub" disabled>Export Public</button>
    <button class="btn-ghost" id="exportPriv" disabled>Export Private</button>
  </div>
  <textarea id="rsaPeerPub" placeholder="Paste receiver's public PEM"></textarea>
  <div class="row">
    <button class="btn-primary" id="rsaEncryptBtn">Encrypt</button>
    <button class="btn-ghost" id="rsaDecryptBtn">Decrypt</button>
  </div>
</div>

<div class="panel">
  <h3>Hash / HMAC</h3>
  <div class="row">
    <select id="hashAlgo"><option>SHA-256</option><option>SHA-512</option></select>
    <button class="btn-ghost" id="hashBtn">Hash</button>
    <input id="hmacKey" type="text" placeholder="HMAC key">
    <button class="btn-primary" id="hmacBtn">Compute HMAC</button>
  </div>
  <div class="log" id="hashOut">Result: —</div>
</div>

<div class="panel">
  <h3>Encoding Tools</h3>
  <div class="row">
    <select id="encSelect">
      <option>Base64 Encode</option>
      <option>Base64 Decode</option>
      <option>Hex Encode</option>
      <option>Hex Decode</option>
      <option>Reverse Text</option>
      <option>Caesar +3</option>
    </select>
    <button class="btn-ghost" id="encRun">Run</button>
  </div>
  <div class="log" id="encOut">Output: —</div>
</div>

<div class="panel">
  <h3>Password Strength & Entropy</h3>
  <div class="row">
    <input id="pwdInput" type="text" placeholder="Password">
    <button class="btn-primary" id="pwdCalc">Analyze</button>
  </div>
  <div class="log" id="pwdResult">Entropy: — • Crack time: —</div>
</div>

<div class="panel">
  <h3>Log</h3>
  <div class="log" id="log">Lab ready. Browser-only operations.</div>
</div>

</body>
    </html>
