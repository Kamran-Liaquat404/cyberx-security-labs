<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Encryptor & Decryptor | CyberX</title>

<!-- CryptoJS CDN for AES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#000;
  color:#fff;
  font-family:"Courier New", monospace;
  overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 24px;
  border-bottom:1px solid #111;
}
.logo{
  font-size:22px;
  letter-spacing:2px;
  font-weight:bold;
}
.logo span{color:#0f0}
.menu-btn{
  font-size:26px;
  cursor:pointer;
  user-select:none;
}

/* ===== DROPDOWN ===== */
.dropdown{
  position:fixed;
  top:0;
  right:18px;
  width:230px;
  background:#050505;
  border:1px solid #222;
  transform:translateY(-120%);
  transition:0.35s ease;
  z-index:999;
}
.dropdown.active{transform:translateY(60px)}
.dropdown a{
  display:block;
  padding:13px 16px;
  color:#ccc;
  text-decoration:none;
  border-bottom:1px solid #111;
}
.dropdown a:hover{
  background:#0a0a0a;
  color:#0f0;
}

/* ===== CONTAINER ===== */
.container{
  max-width:900px;
  margin:40px auto;
  padding:0 18px;
}

/* ===== SECTION ===== */
.section{
  background:#050505;
  border:1px solid #111;
  padding:28px;
  margin-bottom:30px;
}

.section h2{
  color:#0f0;
  margin-bottom:12px;
  letter-spacing:1px;
}

.section p{
  color:#ccc;
  font-size:14px;
  line-height:1.7;
  margin-bottom:12px;
}

/* ===== INPUTS & BUTTONS ===== */
textarea, input[type="password"]{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#000;
  border:1px solid #222;
  border-radius:8px;
  color:#0f0;
  font-family:"Courier New", monospace;
  font-size:14px;
}

button{
  padding:10px 14px;
  margin-top:12px;
  margin-right:6px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button.encrypt{background:linear-gradient(90deg,#0f0,#00ff88);color:#002a10;}
button.decrypt{background:linear-gradient(90deg,#ff4444,#ff8888);color:#210000;}
button.copy{background:#222;color:#0f0;}
button.clear{background:#111;color:#ccc;}

/* ===== RESULTS BOX ===== */
.result-box{
  background:#030303;
  border:1px solid #222;
  padding:18px;
  margin-top:18px;
  border-radius:8px;
  color:#0f0;
  word-break:break-all;
  min-height:80px;
  font-size:14px;
  white-space:pre-wrap;
}

/* ===== FOOTER ===== */
footer{
  margin-top:60px;
  padding:22px;
  text-align:center;
  border-top:1px solid #111;
  font-size:13px;
  color:#777;
}
footer a{
  color:#ccc;
  text-decoration:none;
  margin:0 12px;
}
footer a:hover{color:#0f0}

/* ===== MOBILE ===== */
@media(max-width:600px){
  .logo{font-size:18px}
  button{margin-top:8px;width:100%;}
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">Cyber<span>X</span></div>
  <div class="menu-btn" id="menuBtn">⋮</div>
</header>


<!-- CONTENT -->
<div class="container">
  <div class="section">
    <h2>TEXT ENCRYPTOR & DECRYPTOR</h2>
    <p>Enter your text below and use AES-256 encryption to secure it. You can also decrypt text using the same password.</p>
    
    <label for="textInput">Text:</label>
    <textarea id="textInput" rows="6" placeholder="Enter your text here..."></textarea>
    
    <label for="passwordInput">Password:</label>
    <input type="password" id="passwordInput" placeholder="Enter a strong password...">
    
    <div>
      <button class="encrypt" id="encryptBtn">Encrypt</button>
      <button class="decrypt" id="decryptBtn">Decrypt</button>
      <button class="copy" id="copyBtn">Copy</button>
      <button class="clear" id="clearBtn">Clear</button>
    </div>
    
    <div class="result-box" id="resultBox" placeholder="Result will appear here..."></div>
  </div>
</div>


<script>
const menuBtn = document.getElementById("menuBtn");
const dropdown = document.getElementById("dropdown");

menuBtn.onclick = () => {
  dropdown.classList.toggle("active");
};

document.addEventListener("click", (e) => {
  if (!menuBtn.contains(e.target) && !dropdown.contains(e.target)) {
    dropdown.classList.remove("active");
  }
});

// AES Encryption & Decryption
const encryptBtn = document.getElementById("encryptBtn");
const decryptBtn = document.getElementById("decryptBtn");
const copyBtn = document.getElementById("copyBtn");
const clearBtn = document.getElementById("clearBtn");
const textInput = document.getElementById("textInput");
const passwordInput = document.getElementById("passwordInput");
const resultBox = document.getElementById("resultBox");

encryptBtn.addEventListener("click", ()=>{
  const text = textInput.value.trim();
  const password = passwordInput.value.trim();
  if(!text || !password){ alert("Text and password are required!"); return; }
  const ciphertext = CryptoJS.AES.encrypt(text, password).toString();
  resultBox.textContent = ciphertext;
});

decryptBtn.addEventListener("click", ()=>{
  const ciphertext = textInput.value.trim();
  const password = passwordInput.value.trim();
  if(!ciphertext || !password){ alert("Ciphertext and password are required!"); return; }
  try{
    const bytes = CryptoJS.AES.decrypt(ciphertext, password);
    const plaintext = bytes.toString(CryptoJS.enc.Utf8);
    if(!plaintext) throw new Error("Invalid password or ciphertext");
    resultBox.textContent = plaintext;
  }catch(e){
    alert("Decryption failed: Invalid password or ciphertext");
  }
});

copyBtn.addEventListener("click", ()=>{
  if(!resultBox.textContent){ alert("Nothing to copy!"); return; }
  navigator.clipboard.writeText(resultBox.textContent).then(()=>alert("Copied to clipboard"));
});

clearBtn.addEventListener("click", ()=>{
  textInput.value="";
  passwordInput.value="";
  resultBox.textContent="";
});
</script>

</body>
  </html>
